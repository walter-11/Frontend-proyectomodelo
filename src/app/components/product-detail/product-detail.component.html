<div class="product-detail-container" *ngIf="product; else loading">
  <div class="detail-card glass animate-fade">
    <div class="detail-info">
      <h2 class="gradient-text">{{ product.name }}</h2>
      <p class="price">${{ product.price }}</p>
      
      <div class="specs">
        <div class="spec-item">
          <span class="label">Stock Disponible:</span>
          <span class="value">{{ product.stock }} unidades</span>
        </div>
        <div class="spec-item">
          <span class="label">Estado:</span>
          <span class="value" [class.active]="product.active">{{ product.active ? 'Activo' : 'Inactivo' }}</span>
        </div>
        <div class="spec-item">
          <span class="label">Categoría:</span>
          <span class="value">{{ product.category?.category || 'Categoría ' + product.categoryId }}</span>
        </div>
      </div>

      <div class="actions">
        <button class="btn-modern outline" (click)="goBack()">Volver a Productos</button>
        <button class="btn-modern">Añadir al Carrito</button>
      </div>
    </div>
  </div>
</div>

<ng-template #loading>
  <div class="loading">
    <p>Cargando detalles del producto...</p>
  </div>
</ng-template>
